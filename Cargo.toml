[workspace]
resolver = "2"
members = [
    "crates/shared",
    "crates/server",
    "crates/client",
]

[workspace.package]
edition = "2021"
version = "0.1.0"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
postcard = { version = "1.1", features = ["alloc"] }
bevy = "0.18"
bevy_ecs = "0.18"

shared = { path = "crates/shared" }
